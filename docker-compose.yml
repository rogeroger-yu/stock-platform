services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - STOCK_DEBUG=true
      - STOCK_DATABASE_URL=sqlite:///./data/stock.db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
